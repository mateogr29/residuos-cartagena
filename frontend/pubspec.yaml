name: residuos_cartagena
description: Plataforma colaborativa de gestión de residuos en Cartagena

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  image_picker: ^1.0.4
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  permission_handler: ^12.0.3
  uuid: ^4.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
